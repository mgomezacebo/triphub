<!DOCTYPE html>
<html lang="es" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripHub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#2e1065',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f4f4f5;
            /* zinc-100 */
        }

        ::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            /* zinc-300 */
            border-radius: 9999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1aa;
            /* zinc-400 */
        }

        /* Custom Styles & Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            /* white with opacity */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(228, 228, 231, 0.6);
            /* zinc-200 */
        }
    </style>
</head>

<body class="bg-zinc-50 text-zinc-900 min-h-screen flex flex-col md:flex-row antialiased overflow-x-hidden">

    <!-- Mobile Header -->
    <header
        class="md:hidden bg-white border-b border-zinc-200 px-4 py-3 flex items-center justify-between sticky top-0 z-40">
        <div class="flex items-center space-x-2">
            <div
                class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center font-bold text-white shadow-lg shadow-brand-500/20">
                T</div>
            <span
                class="font-bold text-lg tracking-tight bg-gradient-to-r from-brand-600 to-indigo-600 bg-clip-text text-transparent">TripHub</span>
        </div>
        <button id="mobile-menu-btn" class="text-zinc-500 hover:text-zinc-800 focus:outline-none p-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>
    </header>

    <!-- Sidebar Navigation -->
    <aside id="sidebar"
        class="hidden md:flex flex-col w-64 bg-white border-r border-zinc-200 sticky top-0 h-screen z-50 transition-all duration-300 flex-shrink-0">
        <!-- Logo Section -->
        <div class="p-6 border-b border-zinc-200 flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="showPage('inicio')">
                <div
                    class="w-9 h-9 rounded-xl bg-gradient-to-tr from-brand-600 to-indigo-500 flex items-center justify-center font-extrabold text-white shadow-lg shadow-brand-600/30">
                    T</div>
                <div>
                    <h1
                        class="font-bold text-lg leading-none bg-gradient-to-r from-brand-600 to-indigo-600 bg-clip-text text-transparent">
                        TripHub</h1>
                </div>
            </div>
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">
            <a href="#" onclick="showPage('inicio'); return false;" id="nav-inicio"
                class="flex items-center space-x-3 px-4 py-3 rounded-xl text-zinc-600 hover:text-brand-600 hover:bg-zinc-100 transition-all group">
                <svg class="w-5 h-5 group-hover:text-brand-600 transition" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                    </path>
                </svg>
                <span class="font-medium text-sm">Inicio</span>
            </a>
            <a href="#" onclick="showPage('personas'); return false;" id="nav-personas"
                class="flex items-center space-x-3 px-4 py-3 rounded-xl text-zinc-600 hover:text-brand-600 hover:bg-zinc-100 transition-all group">
                <svg class="w-5 h-5 group-hover:text-brand-600 transition" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
                <span class="font-medium text-sm">Personas</span>
            </a>
            <a href="#" onclick="showPage('notas'); return false;" id="nav-notas"
                class="flex items-center space-x-3 px-4 py-3 rounded-xl text-zinc-600 hover:text-brand-600 hover:bg-zinc-100 transition-all group">
                <svg class="w-5 h-5 group-hover:text-brand-600 transition" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                    </path>
                </svg>
                <span class="font-medium text-sm">Notas</span>
            </a>
            <a href="#" onclick="showPage('ajustes'); return false;" id="nav-ajustes"
                class="flex items-center space-x-3 px-4 py-3 rounded-xl text-zinc-600 hover:text-brand-600 hover:bg-zinc-100 transition-all group">
                <svg class="w-5 h-5 group-hover:text-brand-600 transition" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span class="font-medium text-sm">Ajustes y Datos</span>
            </a>
        </nav>

    </aside>

    <!-- Mobile Dropdown Navigation -->
    <div id="mobile-menu"
        class="hidden md:hidden bg-white border-b border-zinc-200 px-4 py-4 space-y-2 absolute top-[53px] left-0 w-full z-40 transition-all shadow-md">
        <a href="#" onclick="showPage('inicio'); toggleMobileMenu(); return false;"
            class="block px-4 py-2.5 rounded-xl text-zinc-700 hover:bg-zinc-100 font-medium text-sm">Inicio</a>
        <a href="#" onclick="showPage('personas'); toggleMobileMenu(); return false;"
            class="block px-4 py-2.5 rounded-xl text-zinc-700 hover:bg-zinc-100 font-medium text-sm">Personas</a>
        <a href="#" onclick="showPage('notas'); toggleMobileMenu(); return false;"
            class="block px-4 py-2.5 rounded-xl text-zinc-700 hover:bg-zinc-100 font-medium text-sm">Notas</a>
        <a href="#" onclick="showPage('ajustes'); toggleMobileMenu(); return false;"
            class="block px-4 py-2.5 rounded-xl text-zinc-700 hover:bg-zinc-100 font-medium text-sm">Ajustes y Datos</a>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 min-h-screen">
        <!-- Top Bar Header (Desktop only) -->
        <header
            class="hidden md:flex items-center justify-between px-8 py-5 border-b border-zinc-200 bg-white sticky top-0 z-30">
            <h2 id="current-view-title" class="text-xl font-bold text-zinc-800">Cargando...</h2>
        </header>

        <!-- View Containers -->
        <div id="view-content" class="flex-1 p-6 md:p-8 overflow-y-auto">
            <!-- Dynamic views will be injected here by script.js -->
            <div class="flex items-center justify-center h-full text-zinc-400">
                <div class="text-center">
                    <svg class="w-12 h-12 animate-spin text-brand-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    <p class="font-medium text-zinc-500">Inicializando aplicación...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Modals Container -->
    <div id="modal-container"
        class="fixed inset-0 bg-zinc-900/50 flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div id="modal-content"
            class="bg-white border border-zinc-200 rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-zinc-200 flex items-center justify-between bg-white">
                <h3 id="modal-title" class="font-bold text-lg text-zinc-900">Título</h3>
                <button onclick="closeModal()"
                    class="text-zinc-400 hover:text-zinc-700 transition p-1 rounded-lg hover:bg-zinc-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <!-- Modal Body -->
            <div id="modal-body"
                class="p-6 overflow-y-auto flex-1 text-sm text-zinc-600 leading-relaxed font-normal bg-white">
                Contenido
            </div>
            <!-- Modal Footer -->
            <div id="modal-footer" class="px-6 py-4 border-t border-zinc-200 bg-zinc-50 flex justify-end space-x-3">
                <!-- Buttons injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"
        class="fixed bottom-6 right-6 z-50 flex flex-col gap-2.5 pointer-events-none max-w-sm w-full font-sans">
        <!-- Toast elements dynamically added here -->
    </div>

    <!-- JS Logic -->
    <script src="script.js"></script>
</body>

</html>
